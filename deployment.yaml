apiVersion: apps/v1
kind: Deployment

metadata:
  name: voting-app-deployment
  labels:
    app: voting-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: voting-app

  template:
    metadata:
      labels:
        app: voting-app

    spec:
      containers:
        - name: voting-app

          image: your-dockerhub-username/voting-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---

apiVersion: v1
kind: Service

metadata:
  name: voting-app-service

spec:
  type: NodePort

  selector:
    app: voting-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007